
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'a_login.css' %}">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <title>Admin Login | Bookalay</title>
</head>
<body>

{% if messages %}
<div class="toast-container position-fixed top-30 start-50 translate-middle p-3" style="z-index:9999;">
    {% for message in messages %}
    <div class="toast show text-white 
        {% if message.tags == 'error' %}bg-danger{% else %}bg-success{% endif %}">
        <div class="toast-body text-center">
            {{ message }}
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}

<div class="wrapper">
    <form action="{% url 'adminlogin' %}" method="POST">
        {% csrf_token %}

        <h1>
            <i class="bi bi-shield-lock-fill"></i><br>
            Admin Login
        </h1>

        <div class="input-box">
            <input type="text" name="a_username" placeholder="ADMIN USERNAME" required>
            <i class="bi bi-person-badge-fill"></i>
        </div>

        <div class="input-box">
            <input type="password" name="a_password" placeholder="ADMIN PASSWORD" required>
            <i class="bi bi-lock-fill"></i>
        </div>

        <div class="d-grid gap-2 col-6 mx-auto mt-3">
            <button class="btn btn-primary" type="submit">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Activate all toasts
    const toastElList = [].slice.call(document.querySelectorAll('.toast'))
    toastElList.map(function (toastEl) {
        return new bootstrap.Toast(toastEl).show()
    })
</script>

</body>
</html>
