{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Bookalay</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'register.css' %}">
</head>

<body>

<div class="bg-page d-flex justify-content-center align-items-center">

    <div class="glass-card p-4">

        <h2 class="text-center fw-bold mb-4">Registration Form</h2>

        <!-- ✅ TOAST MESSAGE -->
{% if messages %}
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    {% for message in messages %}
    <div class="toast align-items-center text-white 
        {% if message.tags == 'error' %}bg-danger{% else %}bg-success{% endif %} 
        border-0 show" role="alert">

        <div class="d-flex">
            <div class="toast-body">
                {{ message }}
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    setTimeout(() => {
        document.querySelectorAll('.toast').forEach(toast => toast.remove());
    }, 3000); // auto-hide in 3 seconds
</script>
{% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <input type="text" class="form-control glass-input"
                       name="username" placeholder="Username" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <input type="email" class="form-control glass-input"
                       name="email" placeholder="Email" required>
            </div>

            <!-- Date of Birth -->
            <div class="mb-3">
                <input type="date" class="form-control glass-input"
                       name="dob" required>
            </div>

            <!-- State -->
            <div class="mb-3">
                <select class="form-select glass-input" name="state" required>
                    <option value="">Select State</option>
                    <option>Maharashtra</option>
                    <option>Gujarat</option>
                    <option>Delhi</option>
                    <option>Karnataka</option>
                    <option>Tamil Nadu</option>
                </select>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <input type="password" class="form-control glass-input"
                       name="password1" placeholder="Password" required>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <input type="password" class="form-control glass-input"
                       name="c_password" placeholder="Confirm Password" required>
            </div>

            <!-- Register Button -->
            <button type="submit" class="btn btn-primary  w-100 rounded-pill mb-3">
                Register Account
            </button>

            <p class="text-center text-light small">
                Already have an account?
                <a href="{% url 'login' %}" class="text-warning fw-semibold text-decoration-none">
                    Login here
                </a>
            </p>

        </form>

    </div>

</div>

</body>
</html>
